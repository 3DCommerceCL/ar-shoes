<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>AR Shoe Try-On</title>
  <link rel="stylesheet" href="style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <!-- UI AR (visible solo durante uso) -->
  <div id="ui" style="display:none">
    <div id="status-bar">
      <span id="status">Detectando…</span>
    </div>
    <div id="controls">
      <button id="btn-switch-foot" type="button">Pie izquierdo</button>
      <button id="btn-recalibrate" type="button">Recalibrar</button>
      <div id="opacity-control">
        <label for="slider-opacity">Opacidad</label>
        <input id="slider-opacity" type="range" min="0.1" max="1" step="0.05" value="1" />
      </div>
    </div>
  </div>

  <!-- PASO 1: Calibrar fondo -->
  <div id="step-1" class="step-screen" style="display:none">
    <div class="step-card">
      <div class="step-icon">📷</div>
      <h2>Paso 1 de 2</h2>
      <p>Apunta la cámara al <strong>piso vacío</strong> donde vas a pararte.</p>
      <p class="step-hint">No pongas el pie aún — necesitamos ver solo el suelo.</p>
      <button id="btn-calibrate" class="btn-primary">Calibrar fondo</button>
    </div>
  </div>

  <!-- PASO 2: Poner el pie -->
  <div id="step-2" class="step-screen" style="display:none">
    <div class="step-card step-card--top">
      <div class="step-icon">👟</div>
      <h2>Paso 2 de 2</h2>
      <p>Ahora <strong>pon tu pie</strong> en la cámara.</p>
      <p class="step-hint">El zapato virtual aparecerá sobre tu pie en segundos.</p>
    </div>
  </div>

  <!-- Pantalla de carga inicial -->
  <div id="loading-screen">
    <div class="spinner"></div>
    <p id="loading-msg">Cargando visor AR…</p>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
